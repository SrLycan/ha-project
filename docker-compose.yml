services:
  postgres:
    image: postgres:16-alpine
    container_name: startup_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - private-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: startup_backend
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      PORT: ${API_PORT}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - private-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build: ./frontend
    container_name: startup_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - private-net
      - public-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80"]
      interval: 15s
      timeout: 5s
      retries: 5

  backup:
    build: ./backup
    container_name: startup_backup
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_HOST: postgres
      BACKUP_INTERVAL_MINUTES: ${BACKUP_INTERVAL_MINUTES}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backups:/backups
    networks:
      - private-net

  monitor:
    build: ./monitoring
    container_name: startup_monitor
    restart: unless-stopped
    environment:
      TARGET_URL: http://backend:3000/health
      SLI_THRESHOLD_MS: 500
    ports:
      - "8080:8080"
    depends_on:
      - backend
    networks:
      - private-net

volumes:
  pgdata:
    driver: local

networks:
  private-net:
    driver: bridge
  public-net:
    driver: bridge
